components:
  schemas:
    Devise:
      type: object
      properties:
        code:
          type: string
          example : EUR
        name:
          type: string
          example : Euro
        change:
          type: number
          format: double
          example : 1.0

    DeviseArray:
      type: array
      items:
        $ref: "#/components/schemas/Devise"